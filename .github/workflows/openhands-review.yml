name: openhands-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: OpenHands PR review
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            | head -c 51200 > /tmp/pr.diff

      - name: Review with OpenHands
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, pathlib, subprocess

          api_key = os.environ["OPENHANDS_API_KEY"]
          diff = pathlib.Path("/tmp/pr.diff").read_text(errors="replace")

          prompt = (
              "You are a careful code reviewer. Review the following PR diff "
              "and give concise, actionable feedback. Focus on correctness, "
              "security, test coverage, and edge cases. Format as GitHub Markdown.\n\n"
              "```diff\n" + diff + "\n```"
          )

          payload = json.dumps({
              "messages": [{"role": "user", "content": prompt}],
              "model": "anthropic/claude-sonnet-4-5-20250929",
              "max_tokens": 1024,
          }).encode()

          req = urllib.request.Request(
              "https://app.all-hands.dev/api/v1/chat/completions",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {api_key}",
              },
          )
          with urllib.request.urlopen(req, timeout=60) as r:
              data = json.load(r)

          review = data["choices"][0]["message"]["content"]
          body = (
              "### OpenHands review\n\n" + review
              + "\n\n---\n*Automated review via openhands-review workflow*"
          )

          subprocess.run(
              ["gh", "pr", "comment",
               str(os.environ.get("GITHUB_PR_NUMBER") or
                   os.environ["GITHUB_REF"].split("/")[-2]),
               "--repo", os.environ["GITHUB_REPOSITORY"],
               "--body", body],
              check=True,
          )
          PYEOF
        env:
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
